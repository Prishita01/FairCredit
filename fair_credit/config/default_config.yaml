# Default configuration for FairCredit experiments

# Random seeds for reproducibility
random_seed: 42
numpy_seed: 42
sklearn_seed: 42

# Data splitting configuration
test_size: 0.2
val_size: 0.2
stratify_by_protected: true

# Model training configuration
logistic_regression_params:
  random_state: 42
  max_iter: 1000
  solver: "liblinear"

xgboost_params:
  random_state: 42
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8

# Fairness auditing configuration
bootstrap_samples: 1000
confidence_level: 0.95

# Mitigation configuration
reweighing_enabled: true
threshold_optimization_enabled: true

# Robustness testing configuration
distribution_shift_magnitude: 0.25
missing_data_rate: 0.1
stability_threshold: 0.25

# Output configuration
output_dir: "results"
save_plots: true
save_models: true